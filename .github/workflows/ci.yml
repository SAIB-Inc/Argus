name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 4321:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Detect code changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'src/**'
              - '*.slnx'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - '.github/workflows/ci.yml'

      - name: Setup .NET
        if: steps.changes.outputs.code == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        if: steps.changes.outputs.code == 'true'
        run: dotnet restore

      - name: Build
        if: steps.changes.outputs.code == 'true'
        run: dotnet build --no-restore -warnaserror

      - name: Check formatting
        if: steps.changes.outputs.code == 'true'
        run: dotnet format --no-restore --verify-no-changes

      - name: Test
        if: steps.changes.outputs.code == 'true'
        run: dotnet test --no-build --filter "Category!=Integration&Category!=DataGeneration"

      - name: Pack (dry run)
        if: steps.changes.outputs.code == 'true'
        run: |
          mkdir -p out
          for proj in src/Argus.Sync/Argus.Sync.csproj src/Argus.Sync.EntityFramework/Argus.Sync.EntityFramework.csproj src/Argus.Sync.EntityFramework.Postgres/Argus.Sync.EntityFramework.Postgres.csproj src/Argus.Sync.MongoDb/Argus.Sync.MongoDb.csproj; do
            echo "Packing $proj..."
            dotnet pack "$proj" -c Release -o out
          done
          echo "Packed $(ls out/*.nupkg | wc -l) packages:"
          ls -la out/*.nupkg

      - name: Skip reason
        if: steps.changes.outputs.code != 'true'
        run: echo "No source code changes detected — skipping build/test/pack."
